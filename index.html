<!DOCTYPE html>  
<html lang="de">  
<head>  
    <meta charset="UTF-8">  
    <title>Anwesenheitsliste Feuerwehr</title>  
    <!-- jsPDF über CDN einbinden -->  
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"  
            crossorigin="anonymous" referrerpolicy="no-referrer"></script>  
    <style>  
        body {  
            font-family: Arial, sans-serif;  
            margin: 20px;  
        }  
        h1 {  
            text-align: center;  
        }  
        .form-group {  
            margin-bottom: 10px;  
        }  
        label {  
            display: inline-block;  
            min-width: 120px;  
            font-weight: bold;  
        }  
        input[type="text"], input[type="date"], input[type="time"], select, textarea {  
            padding: 4px;  
            font-size: 14px;  
        }  
        textarea {  
            width: 100%;  
            max-width: 800px;  
            height: 80px;  
        }  
        #teilnehmer-liste {  
            display: flex;  
            flex-wrap: wrap;  
            max-width: 900px;  
            border: 1px solid #ccc;  
            padding: 10px;  
            margin-top: 10px;  
        }  
        .person {  
            width: 50%;  
            box-sizing: border-box;  
            padding: 2px 4px;  
            font-size: 14px;  
        }  
        .person-row {  
            display: flex;  
            align-items: center;  
            gap: 6px;  
            flex-wrap: wrap;  
        }  
        .person-name {  
            flex: 1;  
            min-width: 180px;  
        }  
        .role-label {  
            font-weight: normal;  
            font-size: 12px;  
        }  
        .role-label input {  
            margin-right: 2px;  
        }  
        button {  
            margin-top: 15px;  
            padding: 8px 16px;  
            font-size: 14px;  
        }  
        #anzahl-anwesende {  
            margin-top: 10px;  
            font-weight: bold;  
        }  
        .roles-header {  
            font-size: 12px;  
            margin-bottom: 4px;  
            color: #555;  
        }  
    </style>  
</head>  
<body>  
    <h1>Anwesenheitsliste</h1>  
  
    <div class="form-group">  
        <label for="datum">Datum:</label>  
        <input type="date" id="datum">  
    </div>  
  
    <div class="form-group">  
        <label for="von">Uhrzeit von:</label>  
        <input type="time" id="von">  
    </div>  
  
    <div class="form-group">  
        <label for="bis">Uhrzeit bis:</label>  
        <input type="time" id="bis">  
    </div>  
  
    <div class="form-group">  
        <label for="art">Art:</label>  
        <select id="art">  
            <option value="Einsatz">Einsatz</option>  
            <option value="Übungsdienst">Übungsdienst</option>  
        </select>  
    </div>  
  
    <div class="form-group">  
        <label for="freitext">Freitext:</label><br>  
        <textarea id="freitext" placeholder="z.B. Übungsthema, Einsatzort, Bemerkungen ..."></textarea>  
    </div>

    <div id="anzahl-anwesende">Gesamt anwesend: 0</div>  
  
    <button onclick="generierePDF()">PDF erzeugen</button>  
  
    <script>  
        // Anwesende-Checkboxen (für Zähler und PDF)  
        const anwCheckboxes = document.querySelectorAll('#teilnehmer-liste input.anw');  
        const anzahlAnzeige = document.getElementById('anzahl-anwesende');  
  
        function updateAnzahl() {  
            let count = 0;  
            anwCheckboxes.forEach(cb => {  
                if (cb.checked) count++;  
            });  
            anzahlAnzeige.textContent = "Gesamt anwesend: " + count;  
        }  
  
        anwCheckboxes.forEach(cb => {  
            cb.addEventListener('change', updateAnzahl);  
        });  
  
        function generierePDF() {  
            if (!window.jspdf || !window.jspdf.jsPDF) {  
                alert("PDF-Bibliothek (jsPDF) konnte nicht geladen werden.");  
                return;  
            }  
            const { jsPDF } = window.jspdf;  
            const doc = new jsPDF();  
  
            const datum = document.getElementById('datum').value;  
            const von = document.getElementById('von').value;  
            const bis = document.getElementById('bis').value;  
            const art = document.getElementById('art').value;  
            const freitext = document.getElementById('freitext').value;  
  
            // Anwesende mit Rollen sammeln  
            let anwesende = [];  
            anwCheckboxes.forEach(cb => {  
                if (cb.checked) {  
                    const personDiv = cb.closest('.person-row');  
                    const name = cb.getAttribute('data-name');  
                    const gf = personDiv.querySelector('.gf').checked;  
                    const ma = personDiv.querySelector('.ma').checked;  
                    let rollen = [];  
                    if (gf) rollen.push("GF");  
                    if (ma) rollen.push("MA");  
  
                    let eintrag = name;  
                    if (rollen.length > 0) {  
                        eintrag += " (" + rollen.join(", ") + ")";  
                    }  
                    anwesende.push(eintrag);  
                }  
            });  
  
            const gesamt = anwesende.length;  
  
            let y = 10;  
            doc.setFontSize(16);  
            doc.text("Anwesenheitsliste Feuerwehr", 10, y);  
            y += 8;  
  
            doc.setFontSize(12);  
            doc.text("Datum: " + (datum || "-"), 10, y); y += 6;  
            doc.text("Zeit: " + (von || "-") + " bis " + (bis || "-"), 10, y); y += 6;  
            doc.text("Art: " + art, 10, y); y += 8;  
  
            doc.text("Freitext:", 10, y); y += 6;  
            const freitextZeilen = doc.splitTextToSize(freitext || "-", 180);  
            doc.text(freitextZeilen, 10, y);  
            y += freitextZeilen.length * 6 + 4;  
  
            doc.text("Anwesende (" + gesamt + "):", 10, y);  
            y += 6;  
  
            if (gesamt === 0) {  
                doc.text("Keine Teilnehmer ausgewählt.", 10, y);  
            } else {  
                // Jede Person in eigener Zeile, ggf. auf mehrere Seiten umbrechen  
                anwesende.forEach((zeile, index) => {  
                    if (y > 280) {  
                        doc.addPage();  
                        y = 10;  
                        doc.setFontSize(12);  
                        doc.text("Anwesende (Fortsetzung):", 10, y);  
                        y += 6;  
                    }  
                    doc.text((index + 1) + ". " + zeile, 10, y);  
                    y += 6;  
                });  
            }  
  
            // Datei speichern – Name aus Datum und Art  
            let filename = "Anwesenheit_";  
            if (datum) filename += datum + "_";  
            filename += art + ".pdf";  
  
            doc.save(filename);  
        }  
    </script>
